<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}LNbitsBox{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block head %}{% endblock %}
    <style>
        :root {
            --ln-pink:       255 30 230;
            --ln-pink-dim:   204 24 184;
            --ln-surface:    248 248 252;
            --ln-card:       255 255 255;
            --ln-card-hover: 240 240 246;
            --ln-border:     216 216 228;
            --ln-text:       26 26 46;
            --ln-muted:      106 106 128;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ln-surface:    15 15 20;
                --ln-card:       22 22 30;
                --ln-card-hover: 28 28 38;
                --ln-border:     42 42 58;
                --ln-text:       228 228 239;
                --ln-muted:      122 122 142;
            }
        }
        body { font-family: 'Space Grotesk', sans-serif; }
        .noise-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }
        .glow-pink { box-shadow: 0 0 30px rgba(255, 30, 230, 0.15), 0 0 60px rgba(255, 30, 230, 0.05); }
        input:focus { box-shadow: 0 0 0 1px rgb(var(--ln-pink)), 0 0 20px rgba(255, 30, 230, 0.15); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgb(var(--ln-surface)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--ln-border)); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--ln-pink)); }
        .grid-bg {
            background-image:
                linear-gradient(rgb(var(--ln-border) / 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgb(var(--ln-border) / 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .admin-shell {
            max-width: 96rem;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        .admin-layout {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
        }
        .admin-sidebar {
            width: 18rem;
            position: sticky;
            top: 1rem;
            flex-shrink: 0;
        }
        .admin-sidebar-card {
            background: rgb(var(--ln-card));
            border: 1px solid rgb(var(--ln-border));
            border-radius: 1rem;
            padding: 1rem;
            box-shadow: 0 12px 40px rgba(15, 15, 20, 0.04);
        }
        .admin-sidebar-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .admin-sidebar-group {
            border-top: 1px solid rgb(var(--ln-border) / 0.7);
            padding-top: 0.75rem;
            margin-top: 0.75rem;
        }
        .admin-sidebar-group summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            list-style: none;
            color: rgb(var(--ln-muted));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .admin-sidebar-group summary::-webkit-details-marker {
            display: none;
        }
        .admin-sidebar-group summary::after {
            content: '+';
            font-size: 1rem;
            line-height: 1;
        }
        .admin-sidebar-group[open] summary::after {
            content: '-';
        }
        .admin-sidebar-links {
            display: grid;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .admin-sidebar-link {
            display: block;
            padding: 0.75rem 0.875rem;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            background: transparent;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }
        .admin-sidebar-link:hover {
            background: rgb(var(--ln-surface));
            border-color: rgb(var(--ln-border));
        }
        .admin-sidebar-link.active {
            background: rgb(var(--ln-pink) / 0.08);
            border-color: rgb(var(--ln-pink) / 0.28);
        }
        .admin-sidebar-link-label {
            display: block;
            font-weight: 600;
            color: rgb(var(--ln-text));
            margin-bottom: 0.2rem;
        }
        .admin-sidebar-link-copy {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            line-height: 1.4;
            color: rgb(var(--ln-muted));
        }
        .admin-content {
            min-width: 0;
            flex: 1;
        }
        .admin-mobile-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.9rem 1rem;
            background: rgb(var(--ln-card));
            border: 1px solid rgb(var(--ln-border));
            border-radius: 1rem;
        }
        .admin-mobile-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.75rem;
            border: 1px solid rgb(var(--ln-border));
            background: rgb(var(--ln-surface));
        }
        .admin-page-header {
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, rgb(var(--ln-card)) 0%, rgb(var(--ln-surface)) 100%);
            border: 1px solid rgb(var(--ln-border));
            border-radius: 1rem;
            padding: 1.25rem;
        }
        .admin-page-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .admin-page-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 0.95rem;
            border-radius: 0.75rem;
            border: 1px solid rgb(var(--ln-border));
            background: rgb(var(--ln-card));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .admin-page-action.primary {
            background: rgb(var(--ln-pink));
            border-color: rgb(var(--ln-pink));
            color: white;
        }
        .header-update-link {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 0.95rem;
            border-radius: 0.9rem;
            border: 1px solid rgb(var(--ln-pink) / 0.3);
            background: rgb(var(--ln-pink) / 0.08);
            color: rgb(var(--ln-pink));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }
        .header-update-link.visible {
            display: inline-flex;
        }
        .header-update-link:hover {
            background: rgb(var(--ln-pink) / 0.14);
            border-color: rgb(var(--ln-pink) / 0.42);
            color: rgb(var(--ln-pink-dim));
        }
        .power-menu summary {
            list-style: none;
            cursor: pointer;
        }
        .power-menu summary::-webkit-details-marker {
            display: none;
        }
        .power-menu {
            position: relative;
        }
        .power-menu[open] .power-menu-button {
            border-color: rgb(var(--ln-pink) / 0.3);
            background: rgb(var(--ln-surface));
        }
        .power-menu-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 7.5rem;
            padding: 0.7rem 1rem;
            border-radius: 0.9rem;
            border: 1px solid rgb(var(--ln-border));
            background: rgb(var(--ln-card));
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
            user-select: none;
        }
        .power-menu-button:hover {
            background: rgb(var(--ln-surface));
            border-color: rgb(var(--ln-pink) / 0.28);
            color: rgb(var(--ln-text));
        }
        .power-menu-button:focus-visible {
            outline: 2px solid rgb(var(--ln-pink) / 0.45);
            outline-offset: 2px;
        }
        .power-menu-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 0.5rem);
            width: 11rem;
            background: rgb(var(--ln-card));
            border: 1px solid rgb(var(--ln-border));
            border-radius: 0.9rem;
            padding: 0.4rem;
            box-shadow: 0 16px 40px rgba(15, 15, 20, 0.12);
        }
        .power-menu-item {
            width: 100%;
            text-align: left;
            padding: 0.75rem 0.85rem;
            border-radius: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            transition: background-color 0.15s ease, color 0.15s ease;
            cursor: pointer;
        }
        .power-menu-item:hover {
            background: rgb(var(--ln-surface));
        }
        .admin-overview-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.8fr) minmax(18rem, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .admin-stack {
            display: grid;
            gap: 1rem;
        }
        .admin-note-card {
            background: rgb(var(--ln-card));
            border: 1px solid rgb(var(--ln-border));
            border-radius: 1rem;
            padding: 1rem;
        }
        .admin-note-card h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgb(var(--ln-muted));
            margin-bottom: 0.75rem;
        }
        .admin-note-card p {
            color: rgb(var(--ln-muted));
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .admin-note-list {
            display: grid;
            gap: 0.75rem;
        }
        .admin-note-list a {
            display: block;
            padding: 0.85rem 0.9rem;
            border-radius: 0.75rem;
            background: rgb(var(--ln-surface));
            border: 1px solid rgb(var(--ln-border));
        }
        .admin-note-list strong {
            display: block;
            font-size: 0.9rem;
            color: rgb(var(--ln-text));
            margin-bottom: 0.25rem;
        }
        .admin-note-list span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: rgb(var(--ln-muted));
        }
        .admin-sidebar-backdrop {
            display: none;
        }
        body.sidebar-open {
            overflow: hidden;
        }
        @media (max-width: 959px) {
            .admin-shell {
                padding: 1rem;
            }
            .admin-layout {
                display: block;
            }
            .admin-mobile-bar {
                display: flex;
            }
            .admin-sidebar {
                position: fixed;
                inset: 0 auto 0 0;
                width: min(20rem, calc(100vw - 2.5rem));
                z-index: 60;
                transform: translateX(-110%);
                transition: transform 0.2s ease;
                padding: 1rem 0 1rem 1rem;
            }
            body.sidebar-open .admin-sidebar {
                transform: translateX(0);
            }
            .admin-sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
                z-index: 55;
            }
            body.sidebar-open .admin-sidebar-backdrop {
                display: block;
            }
            .admin-overview-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (min-width: 640px) {
            .admin-shell {
                padding: 1.5rem;
            }
            .admin-page-header {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="bg-ln-surface text-ln-text min-h-screen noise-bg grid-bg">
    <div class="relative z-10">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
                {% for category, message in messages %}
                    <div class="{% if category == 'error' %}bg-red-500/10 border-red-500/30 text-red-300{% elif category == 'success' %}bg-emerald-500/10 border-emerald-500/30 text-emerald-300{% else %}bg-amber-500/10 border-amber-500/30 text-amber-300{% endif %} border px-4 py-3 rounded-lg font-mono text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
