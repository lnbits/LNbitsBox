<div class="bg-ln-card border border-ln-border rounded-xl p-4 sm:p-5">
    <div class="text-ln-muted text-xs font-mono uppercase tracking-wider mb-4">Services</div>
    <div class="space-y-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full" id="svc-lnbits-dot"></div>
                <span class="font-mono text-sm">LNbits</span>
                <span class="text-ln-muted font-mono text-xs" id="svc-lnbits-status">--</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-lnbits-actions-loading" class="text-ln-muted text-xs font-mono">Checking...</span>
                <button id="svc-lnbits-restart-btn" data-confirm-action="restart/lnbits" data-confirm-message="Restart LNbits?"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Restart
                </button>
                <button id="svc-lnbits-start-btn" data-run-action="start/lnbits"
                        class="hidden text-ln-muted hover:text-emerald-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-emerald-400/30">
                    Start
                </button>
                <button id="svc-lnbits-stop-btn" data-confirm-action="stop/lnbits" data-confirm-message="Stop LNbits?"
                        class="hidden text-ln-muted hover:text-red-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-red-400/30">
                    Stop
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full" id="svc-spark-sidecar-dot"></div>
                <span class="font-mono text-sm">Spark</span>
                <span class="text-ln-muted font-mono text-xs" id="svc-spark-sidecar-status">--</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-spark-sidecar-actions-loading" class="text-ln-muted text-xs font-mono">Checking...</span>
                <button id="svc-spark-sidecar-restart-btn" data-confirm-action="restart/spark-sidecar" data-confirm-message="Restart Spark?"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Restart
                </button>
                <button id="svc-spark-sidecar-start-btn" data-run-action="start/spark-sidecar"
                        class="hidden text-ln-muted hover:text-emerald-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-emerald-400/30">
                    Start
                </button>
                <button id="svc-spark-sidecar-stop-btn" data-confirm-action="stop/spark-sidecar" data-confirm-message="Stop Spark?"
                        class="hidden text-ln-muted hover:text-red-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-red-400/30">
                    Stop
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full" id="svc-phoenixd-dot"></div>
                <span class="font-mono text-sm">Phoenixd</span>
                <span class="text-ln-muted font-mono text-xs" id="svc-phoenixd-status">--</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-phoenixd-actions-loading" class="text-ln-muted text-xs font-mono">Checking...</span>
                <button id="svc-phoenixd-restart-btn" data-confirm-action="restart/phoenixd" data-confirm-message="Restart Phoenixd?"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Restart
                </button>
                <button id="svc-phoenixd-start-btn" data-run-action="start/phoenixd"
                        class="hidden text-ln-muted hover:text-emerald-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-emerald-400/30">
                    Start
                </button>
                <button id="svc-phoenixd-stop-btn" data-confirm-action="stop/phoenixd" data-confirm-message="Stop Phoenixd?"
                        class="hidden text-ln-muted hover:text-red-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-red-400/30">
                    Stop
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full" id="svc-tor-dot"></div>
                <span class="font-mono text-sm">Tor</span>
                <span class="text-ln-muted font-mono text-xs" id="svc-tor-status">--</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-tor-actions-loading" class="text-ln-muted text-xs font-mono">Checking...</span>
                <button id="svc-tor-restart-btn" data-confirm-action="restart/tor" data-confirm-message="Restart Tor?"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Restart
                </button>
                <button id="svc-tor-start-btn" data-run-action="start/tor"
                        class="hidden text-ln-muted hover:text-emerald-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-emerald-400/30">
                    Start
                </button>
                <button id="svc-tor-stop-btn" data-confirm-action="stop/tor" data-confirm-message="Stop Tor?"
                        class="hidden text-ln-muted hover:text-red-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-red-400/30">
                    Stop
                </button>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full" id="svc-tunnel-dot"></div>
                <span class="font-mono text-sm">Tunnel</span>
                <span class="text-ln-muted font-mono text-xs" id="svc-tunnel-status">--</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="svc-tunnel-actions-loading" class="text-ln-muted text-xs font-mono">Checking...</span>
                <button id="svc-tunnel-create-btn"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Create Tunnel
                </button>
                <button id="svc-tunnel-restart-btn" data-confirm-action="tunnel/start" data-confirm-message="Restart Tunnel Me Out service?"
                        class="hidden text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-ln-pink/30">
                    Restart
                </button>
                <button id="svc-tunnel-start-btn" data-run-action="tunnel/start"
                        class="hidden text-ln-muted hover:text-emerald-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-emerald-400/30">
                    Start
                </button>
                <button id="svc-tunnel-stop-btn" data-confirm-action="tunnel/stop" data-confirm-message="Stop Tunnel Me Out service?"
                        class="hidden text-ln-muted hover:text-red-400 text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1 border border-ln-border rounded-lg hover:border-red-400/30">
                    Stop

            </div>
        </div>
