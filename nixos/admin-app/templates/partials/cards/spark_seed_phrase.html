<div class="bg-ln-card border border-ln-border rounded-xl p-4 sm:p-5 transition-all duration-500" id="spark-seed-card">
    <div class="flex items-center justify-between gap-3 mb-3">
        <div class="text-ln-muted text-xs font-mono uppercase tracking-wider">Spark Wallet Seed Phrase</div>
        <button
            id="spark-seed-toggle-btn"
            type="button"
            {% if not spark_mnemonic %}disabled{% endif %}
            class="text-ln-muted hover:text-ln-pink text-xs font-mono uppercase tracking-wider transition-colors px-3 py-1.5 border border-ln-border rounded-lg hover:border-ln-pink/30"
        >
            {% if spark_mnemonic %}Show Seed Phrase{% else %}Unavailable{% endif %}
        </button>
    </div>

    <p class="text-ln-muted text-xs font-mono mb-4">
        Keep this phrase private. Anyone with it can control the Spark wallet.
    </p>

    <div
        id="spark-seed-value"
        class="bg-ln-surface border border-ln-border rounded-lg p-3 font-mono text-sm text-ln-text break-words select-text"
        data-seed-phrase="{{ spark_mnemonic or '' }}"
        data-masked="true"
    >
        {% if spark_mnemonic %}
        ••••• ••••• ••••• ••••• ••••• ••••• ••••• ••••• ••••• ••••• ••••• •••••
        {% else %}
        Seed phrase not available.
        {% endif %}
    </div>
</div>
